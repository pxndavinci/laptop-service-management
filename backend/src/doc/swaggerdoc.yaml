openapi: 3.0.3

info:
  title: KS Tech Service Management API
  version: 1.0.0
  description: 
    API for managing users, Products, and service orders
    in a service-center / repair business.
    Designed using API-first principles.

servers:
  - url: http://localhost:3000

tags:
  - name: Users
  - name: Contacts
  - name: Products
  - name: Service Orders
  - name: Service Status
  - name: Reference Data

paths:
  # ==================== USERS ====================
  /users:
    get:
      tags: [Users]
      summary: Get all users
      description: Retrieve all users with optional filtering and pagination
      parameters:
        - name: userName
          in: query
          schema:
            type: string
          description: Search by username
        - name: email
          in: query
          schema:
            type: string
          description: Search by email
        - name: roleId
          in: query
          schema:
            type: integer
            format: number
          description: Filter by role ID
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:  
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Users'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer

    post:
      tags: [Users]
      summary: Create a new user
      description: Add a new user to the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUser'
      responses:  
        '201':
          description: Users created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Users'
  /users/{userId}:
    get:
      tags: [Users]
      summary: Get user by ID
      description: Get user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'Got user successfully'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Users'

    patch:
      tags: [Users]
      summary: Update user
      description: Update user details
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchUser'
      responses:  
        '200':
          description: Users updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Users'

    delete:
      tags: [Users]
      summary: Delete user
      description: Remove a user from the system
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:  
        '204':
          description: Users deleted successfully

  # ==================== CONTACTS ====================
  /contacts:
    get:
      tags: [Contacts]
      summary: Get all contacts
      description: Retrieve all contacts with optional filtering
      parameters:
        - name: contactNumber
          in: query
          schema:
            type: string
          description: Filter by contact number
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by user ID
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:  
        '200':
          description: List of contacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contacts'
                  total:
                    type: integer
    post:
      tags: [Contacts]
      summary: Create contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContact'
      responses:
        '201':
          description: Contacts created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contacts'

  /contacts/{contactId}:
    get: 
      tags: [Contacts]
      summary: Get contact by ID
      description: Get contact by ID
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'Got contact successfully'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contacts'
    patch:
      tags: [Contacts]
      summary: Update contact
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchContact'
      responses:
        '200':
          description: Contacts updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contacts'
    delete:
      tags: [Contacts]
      summary: Delete contact
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Contacts deleted successfully

  # ==================== Products ====================
  /products:
    get:
      tags: [Products]
      summary: Get all Products
      description: Retrieve all Products with optional filtering
      parameters:
        - name: productName
          in: query
          schema:
            type: string
          description: Filter by product name
        - name: brandId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by brand
        - name: productTypeId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by product type
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of Products
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Products'
                  total:
                    type: integer

    post:
      tags: [Products]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProduct'
      responses:
        '201':
          description: Products created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Products'

  /products/{productId}:
    get:
      tags: [Products]
      summary: Get product by ID
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Got Product successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Products'
    patch:
      tags: [Products]
      summary: Update product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProduct'
      responses:
        '200':
          description: Products updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Products'

    delete:
      tags: [Products]
      summary: Delete product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Products deleted successfully

  # ==================== USER Products ====================
  /user-products:
    get:
      tags: [Products]
      summary: Get all user Products
      description: Retrieve user Products with optional filtering
      parameters:
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by user ID
        - name: productId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by product ID
        - name: serialNumber
          in: query
          schema:
            type: string
          description: Filter by serial number
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: List of user Products
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserProducts'
                  total:
                    type: integer
    post:
      tags: [Products]
      summary: Create user product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserProduct'
      responses:
        '201':
          description: User product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProducts'


  /user-products/{userProductId}:
    get:
      tags: [Products]
      summary: Get user product by ID
      parameters:
        - name: userProductId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Users product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProducts'

    patch:
      tags: [Products]
      summary: Update user product
      parameters:
        - name: userProductId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchUserProduct'
      responses:
        '200':
          description: Users product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProducts'

    delete:
      tags: [Products]
      summary: Delete user product
      parameters:
        - name: userProductId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Users product deleted successfully

  # ==================== SERVICE ORDERS ====================
  /service-orders:
    get:
      tags: [Service Orders]
      summary: Get all service orders
      description: Retrieve all service orders with optional filtering
      parameters:
        - name: tagNo
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 999999
          description: Filter by tagNo
        - name: userProductId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by userProductId
        - name: paymentMethod
          in: query
          schema:
            type: string
            enum: [CASH, CREDIT_CARD, DEBIT_CARD, ONLINE_PAYMENT, OTHER]
          description: Payment method used
        - name: paymentStatus
          in: query
          schema:
            type: string
            enum: [PENDING, COMPLETED, PARTIAL, REFUNDED]
          description: Payment status
        - name: priorityLevel
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
            default: 3
          description: Priority level (1=highest, 5=lowest)
        - name: estimatedCompletionDate
          in: query
          schema:
            type: string
            format: date-time
        - name: actualCompletionDate
          in: query
          schema:
            type: string
            format: date-time
        - name: issueDescription
          in: query
          schema:
            type: string
            enum: [HARDWARE, SOFTWARE, NETWORK, OTHER]
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, IN_PROGRESS, COMPLETED, ON_HOLD]
          description: Filter by status
        - name: entryBy
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by entered by service order person
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: List of service orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ServiceOrders'
                  total:
                    type: integer

    post:
      tags: [Service Orders]
      summary: Create service order
      description: Create a new service order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceOrder'
      responses:
        '201':
          description: Service order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrders'

  /service-orders/{serviceOrderId}:
    get:
      tags: [Service Orders]
      summary: Get service order by ID
      parameters:
        - name: serviceOrderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Service order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrders'
        '404':
          description: Service order not found

    patch:
      tags: [Service Orders]
      summary: Update service order
      parameters:
        - name: serviceOrderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchServiceOrder'
      responses:
        '200':
          description: Service order updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrders'
        '404':
          description: Service order not found

    delete:
      tags: [Service Orders]
      summary: Delete service order
      parameters:
        - name: serviceOrderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Service order deleted successfully

  # ==================== SERVICE STATUS ====================
  /service-status:
    get:
      tags: [Service Status]
      summary: Get service status history
      description: Retrieve all status updates for a service order (timeline)
      parameters:
        - name: serviceOrderId
          in: query
          schema:
            type: string
            format: uuid
        - name: statusId
          in: query
          schema:
            type: string
            format: uuid
        - name: assignedTo
          in: query
          schema:
            type: string
            format: uuid
        - name: notifyCustomer
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Service status history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceStatuses'

    post:
      tags: [Service Status]
      summary: Add status update to service order
      description: Create a status update in the service timeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceStatuses'
      responses:
        '201':
          description: Status update added to timeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatuses'

  /service-status/{serviceStatusId}:
    get:
      tags: [Service Status]
      summary: Get specific status update
      parameters:
        - name: serviceStatusId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Status update details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatuses'

    patch:
      tags: [Service Status]
      summary: Update status comment
      parameters:
        - name: serviceStatusId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchServiceStatuses'
      responses:
        '200':
          description: Status update modified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatuses'

    delete:
      tags: [Service Status]
      summary: Delete status update
      parameters:
        - name: serviceStatusId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Status update deleted successfully

  # ==================== REFERENCE DATA ====================
  /references/roles:
    get:
      tags: [Reference Data]
      summary: Get all roles
      responses:
        '200':
          description: List of all roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Roles'
    post:
      tags: [Reference Data]
      summary: Create role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRole'
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Roles'

  /references/roles/{roleId}:
    patch:
      tags: [Reference Data]
      summary: Update role
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchRole'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Roles'
    delete:
      tags: [Reference Data]
      summary: Delete role
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Role deleted successfully
    
  /references/brands:
    get:
      tags: [Reference Data]
      summary: Get all brands
      responses:
        '200':
          description: List of all brands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Brands'
    post:
      tags: [Reference Data]
      summary: Create brand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBrand'
      responses:
        '201':
          description: Brand created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Brands'

  /references/brands/{brandId}:
    patch:
      tags: [Reference Data]
      summary: Update brand
      parameters:
        - name: brandId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchBrand'
      responses:
        '200':
          description: Brand updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Brands'
    delete:
      tags: [Reference Data]
      summary: Delete brand
      parameters:
        - name: brandId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Brand deleted successfully

  /references/product-types:
    get:
      tags: [Reference Data]
      summary: Get all product types
      responses:
        '200':
          description: List of all product types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductTypes'
    post:
      tags: [Reference Data]
      summary: Create product type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductType'
      responses:
        '201':
          description: Product type created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductTypes'

  /references/product-types/{productTypeId}:
    patch:
      tags: [Reference Data]
      summary: Update product type
      parameters:
        - name: productTypeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProductType'
      responses:
        '200':
          description: Product type updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductTypes'
    delete:
      tags: [Reference Data]
      summary: Delete product type
      parameters:
        - name: productTypeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Product type deleted successfully

  /references/statuses:
    get:
      tags: [Reference Data]
      summary: Get all statuses
      responses:
        '200':
          description: List of all statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Statuses'
    post:
      tags: [Reference Data]
      summary: Create status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStatus'
      responses:
        '201':
          description: Status created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Statuses'

  /references/statuses/{statusId}:
    patch:
      tags: [Reference Data]
      summary: Update status
      parameters:
        - name: statusId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchStatus'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Statuses'
    delete:
      tags: [Reference Data]
      summary: Delete status
      parameters:
        - name: statusId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Status deleted successfully

components:

  schemas:

    # ==================== ROLE ====================
    Roles:
      type: object
      properties:
        roleId:
          type: integer
          format: number
          description: Unique role identifier
        roleName:
          type: string
          description: Name of the role (e.g., customer, servicer, customer_servicer, b2b_customer)
        isServicer:
          type: boolean
          default: false
          description: Whether this role can perform service work
        isCustomer:
          type: boolean
          default: false
          description: Whether this role can be a customer
        isBusiness:
          type: boolean
          default: false
          description: Whether this role is a B2B business entity
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateRole:
      type: object
      required:
        - roleName
      properties:
        roleId:
          type: integer
          format: number
        roleName:
          type: string
          example: "servicer"
        isServicer:
          type: boolean
          example: true
        isCustomer:
          type: boolean
          example: false
        isBusiness:
          type: boolean
          example: false
    PatchRole:
      type: object
      properties:
        roleId:
          type: integer
          format: number
        roleName:
          type: string
          example: "servicer"
        isServicer:
          type: boolean
          example: true
        isCustomer:
          type: boolean
          example: false
        isBusiness:
          type: boolean
          example: false

    # ==================== USER ====================
    Users:
      type: object
      properties:
        userId:
          type: string
          format: uuid
          description: Unique user identifier
        userName:
          type: string
          description: Usersname (must be unique)
        email:
          type: string
          format: email
          description: Users email address (must be unique)
        address:
          type: string
          description: Users's physical address
        role:
          $ref: '#/components/schemas/Roles' 
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateUser:
      type: object
      required:
        - userName
        - email
        - roleId
      properties:
        userName:
          type: string
          example: john_doe
        email:
          type: string
          format: email
          example: john@example.com
        roleId:
          type: integer
          format: number
    
    PatchUser:
      type: object
      properties:
        userName:
          type: string
          example: john_doe
        email:
          type: string
          format: email
          example: john@example.com
        roleId:
          type: integer
          format: number

    # ==================== CONTACT ====================
    Contacts:
      type: object
      properties:
        contactId:
          type: string
          format: uuid
          description: Unique contact identifier
        contactNumber:
          type: string
          description: Phone number
        user:
          $ref: '#/components/schemas/Users'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateContact:
      type: object
      required:
        - contactNumber
        - userId
      properties:
        contactNumber:
          type: string
          example: "9876543210"
        userId:
          type: string
          format: uuid

    PatchContact:
      type: object
      properties:
        contactNumber:
          type: string
          example: "9876543210"
        userId:
          type: string
          format: uuid

    # ==================== BRAND ====================
    Brands:
      type: object
      properties:
        brandId:
          type: string
          format: uuid
        brandName:
          type: string
          description: Name of the brand (e.g., Dell, HP, Lenovo)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateBrand:
      type: object
      required:
        - brandName
      properties:
        brandName:
          type: string
          example: "Dell"
    PatchBrand:
      type: object
      properties:
        brandName:
          type: string
          example: "Dell"
    # ==================== PRODUCT TYPE ====================
    ProductTypes:
      type: object
      properties:
        productTypeId:
          type: string
          format: uuid
        typeName:
          type: string
          description: Type name (e.g., Laptop, Desktop, Tablet)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateProductType:
      type: object
      required:
        - typeName
      properties:
        typeName:
          type: string
          example: "Laptop"
    PatchProductType:
      type: object
      properties:
        typeName:
          type: string
          example: "Laptop"

    # ==================== PRODUCT ====================
    Products:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        productName:
          type: string
          example: "Dell Inspiron 15"
        description:
          type: string
          example: "15-inch laptop with Intel Core i7"
        brand:
          $ref: '#/components/schemas/Brands'
        product_type:
          $ref: '#/components/schemas/ProductTypes'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateProduct:
      type: object
      required:
        - productName
        - brandId
        - productTypeId
      properties:
        productName:
          type: string
        description:
          type: string
        brandId:
          type: string
          format: uuid
        productTypeId:
          type: string
          format: uuid
    PatchProduct:
      type: object
      properties:
        productName:
          type: string
        description:
          type: string
        brandId:
          type: string
          format: uuid
        productTypeId:
          type: string
          format: uuid
    # ==================== USER PRODUCT ====================
    UserProducts:
      type: object
      properties:
        userProductId:
          type: string
          format: uuid
        user:
          $ref: '#/components/schemas/Users'
        product:
          $ref: '#/components/schemas/Products'
        serialNumber:
          type: string
          description: Unique serial number
        loginPassword:
          type: string
          description: Encrypted password for the device
        additionalInfo:
          type: string
          description: Extra information (e.g., RAM, Storage specs)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateUserProduct:
      type: object
      required:
        - productId
        - serialNumber
      properties:
        userId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        serialNumber:
          type: string
        loginPassword:
          type: string
        additionalInfo:
          type: string

    PatchUserProduct:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        serialNumber:
          type: string
        loginPassword:
          type: string
        additionalInfo:
          type: string

    # ==================== SERVICE ORDER ====================
    ServiceOrders:
      type: object
      properties:
        serviceOrderId:
          type: string
          format: uuid
        tagNo:
          type: number
          description: Auto-generated order number (YYDDDD format, e.g., 260001)
        userProduct:
          $ref: '#/components/schemas/UserProducts'
        estimatedPrice:
          type: number
          format: double
          description: Estimated repair cost
        finalPrice:
          type: number
          format: double
          description: Final repair cost
        paymentMethod:
          type: string
          enum: [CASH, CREDIT_CARD, DEBIT_CARD, ONLINE_PAYMENT, OTHER]
          description: Payment method used
        paymentStatus:
          type: string
          enum: [PENDING, COMPLETED, PARTIAL, REFUNDED]
          description: Payment status
        priorityLevel:
          type: integer
          minimum: 1
          maximum: 5
          default: 3
          description: Priority level (1=highest, 5=lowest)
        estimatedCompletionDate:
          type: string
          format: date-time
        actualCompletionDate:
          type: string
          format: date-time
        issueDescription:
          type: string
          enum: [HARDWARE, SOFTWARE, NETWORK, OTHER]
          description: Type of issue
        issueNotes:
          type: string
          description: Detailed notes about the issue
        entryBy:
          $ref: '#/components/schemas/Users'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateServiceOrder:
      type: object
      required:
        - userProductId
        - issueDescription
        - entryBy
      properties:
        userProductId:
          type: string
          format: uuid
        estimatedPrice:
          type: number
          format: double
          minimum: 0
        priorityLevel:
          type: integer
          minimum: 1
          maximum: 5
          default: 3
        estimatedCompletionDate:
          type: string
          format: date-time
        issueDescription:
          type: string
          enum: [HARDWARE, SOFTWARE, NETWORK, OTHER]
        issueNotes:
          type: string
        entryBy:
          type: string
          format: uuid
          description: Must be a servicer or admin user

    PatchServiceOrder:
      type: object
      properties:
        userProductId:
          type: string
          format: uuid
        estimatedPrice:
          type: number
          format: double
          minimum: 0
        finalPrice:
          type: number
          format: double
          minimum: 0
        paymentMethod:
          type: string
          enum: [CASH, CREDIT_CARD, DEBIT_CARD, ONLINE_PAYMENT, OTHER]
        paymentStatus:
          type: string
          enum: [PENDING, COMPLETED, PARTIAL, REFUNDED]
        priorityLevel:
          type: integer
          minimum: 1
          maximum: 5
          default: 3
        estimatedCompletionDate:
          type: string
          format: date-time
        issueDescription:
          type: string
          enum: [HARDWARE, SOFTWARE, NETWORK, OTHER]
        issueNotes:
          type: string
        entryBy:
          type: string
          format: uuid
          description: Must be a servicer or admin user

    # ==================== STATUS ====================
    Statuses:
      type: object
      properties:
        statusId:
          type: string
          format: uuid
        statusName:
          type: string
          description: Status name (e.g., PENDING, IN_PROGRESS, COMPLETED, ON_HOLD)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateStatus:
      type: object
      required:
        - statusName
      properties:
        statusName:
          type: string
    PatchStatus:
      type: object
      properties:
        statusName:
          type: string



    # ==================== SERVICE STATUS ====================
    ServiceStatuses:
      type: object
      properties:
        serviceStatusId:
          type: string
          format: uuid
        serviceOrder:
          $ref: '#/components/schemas/ServiceOrders'
        status:
          $ref: '#/components/schemas/Statuses'
        assignedTo:
          $ref: '#/components/schemas/Users'
        comment:
          type: string
          description: Status update comments
        notifyCustomer:
          type: boolean
          default: false
          description: Whether customer should be notified
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateServiceStatuses:
      type: object
      required:
        - serviceOrderId
        - statusId
        - assignedTo
      properties:
        serviceOrderId:
          type: string
          format: uuid
        statusId:
          type: string
          format: uuid
        assignedTo:
          type: string
          format: uuid
        comment:
          type: string
        notifyCustomer:
          type: boolean
          default: false
    PatchServiceStatuses:
      type: object
      properties:
        serviceOrderId:
          type: string
          format: uuid
        statusId:
          type: string
          format: uuid
        assignedTo:
          type: string
          format: uuid
        comment:
          type: string
        notifyCustomer:
          type: boolean
          default: false

    # ==================== ERROR ====================
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
