openapi: 3.0.3

info:
  title: KS Tech Service Management API
  version: 1.0.0
  description: >
    API for managing users, Products, and service orders
    in a service-center / repair business.
    Designed using API-first principles.

servers:
  - url: http://localhost:3000/api/v1

tags:
  - name: Users
  - name: Contacts
  - name: Products
  - name: Service Orders
  - name: Service Timeline
  - name: Reference Data

paths:
  # ==================== USERS ====================
  /users:
    get:
      tags: [Users]
      summary: Get all users
      description: Retrieve all users with optional filtering and pagination
      parameters:
        - name: user_name
          in: query
          schema:
            type: string
          description: Search by username
        - name: email
          in: query
          schema:
            type: string
          description: Search by email
        - name: role_id
          in: query
          schema:
            type: integer
            format: number
          description: Filter by role ID
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:  
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Users'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer

    post:
      tags: [Users]
      summary: Create a new user
      description: Add a new user to the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUsersRequest'
      responses:  
        '201':
          description: Users created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Users'
  /users/{user_id}:
    get:
      tags: [Users]
      summary: Get user by ID
      description: Get user by ID
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'Got user successfully'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Users'

    patch:
      tags: [Users]
      summary: Update user
      description: Update user details
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUsersRequest'
      responses:  
        '200':
          description: Users updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Users'

    delete:
      tags: [Users]
      summary: Delete user
      description: Remove a user from the system
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUsersRequest'
      responses:  
        '204':
          description: Users deleted successfully

  # ==================== CONTACTS ====================
  /contacts:
    get:
      tags: [Contacts]
      summary: Get all contacts
      description: Retrieve all contacts with optional filtering
      parameters:
        - name: contact_number
          in: query
          schema:
            type: string
          description: Filter by contact number
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by user ID
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:  
        '200':
          description: List of contacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contacts'
                  total:
                    type: integer
    post:
      tags: [Contacts]
      summary: Create contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContactsRequest'
      responses:
        '201':
          description: Contacts created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contacts'

  /contacts/{contact_id}:
    get:
      tags: [Contacts]
      summary: Get contact by ID
      description: Get contact by ID
      parameters:
        - name: contact_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'Got contact successfully'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contacts'
    patch:
      tags: [Contacts]
      summary: Update contact
      parameters:
        - name: contact_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrDeleteContactsRequest'
      responses:
        '200':
          description: Contacts updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contacts'
    delete:
      tags: [Contacts]
      summary: Delete contact
      parameters:
        - name: contact_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrDeleteContactsRequest'
      responses:
        '204':
          description: Contacts deleted successfully

  # ==================== Products ====================
  /products:
    get:
      tags: [Products]
      summary: Get all Products
      description: Retrieve all Products with optional filtering
      parameters:
        - name: serial_number
          in: query
          schema:
            type: string
          description: Filter by serial number
        - name: brand_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by brand
        - name: product_type_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by product type
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of Products
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Products'
                  total:
                    type: integer

    post:
      tags: [Products]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductsRequest'
      responses:
        '201':
          description: Products created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Products'

  /products/{product_id}:
    get:
      tags: [Products]
      summary: Get product by ID
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Got Product successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Products'
    patch:
      tags: [Products]
      summary: Update product
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductsRequest'
      responses:
        '200':
          description: Products updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Products'

    delete:
      tags: [Products]
      summary: Delete product
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Products deleted successfully

  # ==================== USER Products ====================
  /user-products:
    get:
      tags: [Products]
      summary: Get all user Products
      description: Retrieve user Products with optional filtering
      parameters:
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by user ID
        - name: product_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by product ID
        - name: serial_number
          in: query
          schema:
            type: string
          description: Filter by serial number
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: List of user Products
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UsersProducts'
                  total:
                    type: integer
    post:
      tags: [Products]
      summary: Create user product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUsersProductsRequest'
      responses:
        '200':
          description: Users product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersProducts'


  /user-products/{user_product_id}:
    get:
      tags: [Products]
      summary: Get user product by ID
      parameters:
        - name: user_product_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Users product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersProducts'

    patch:
      tags: [Products]
      summary: Update user product
      parameters:
        - name: user_product_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUsersProductsRequest'
      responses:
        '200':
          description: Users product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersProducts'

    delete:
      tags: [Products]
      summary: Delete user product
      parameters:
        - name: user_product_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Users product deleted successfully

  # ==================== SERVICE ORDERS ====================
  /service-orders:
    get:
      tags: [Service Orders]
      summary: Get all service orders
      description: Retrieve all service orders with optional filtering
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, IN_PROGRESS, COMPLETED, ON_HOLD]
          description: Filter by status
        - name: priority_level
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
          description: Filter by priority level
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by user (product owner)
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: List of service orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ServiceOrder'
                  total:
                    type: integer

    post:
      tags: [Service Orders]
      summary: Create service order
      description: Create a new service order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceOrderRequest'
      responses:
        '201':
          description: Service order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrder'

  /service-orders/{service_order_id}:
    get:
      tags: [Service Orders]
      summary: Get service order by ID
      parameters:
        - name: service_order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Service order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrder'
        '404':
          description: Service order not found

    patch:
      tags: [Service Orders]
      summary: Update service order
      parameters:
        - name: service_order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceOrderRequest'
      responses:
        '200':
          description: Service order updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrder'

    delete:
      tags: [Service Orders]
      summary: Delete service order
      parameters:
        - name: service_order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Service order deleted successfully

  # ==================== SERVICE STATUS ====================
  /service-orders/{service_order_id}/status-history:
    get:
      tags: [Service Timeline]
      summary: Get service status history
      description: Retrieve all status updates for a service order (timeline)
      parameters:
        - name: service_order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Service status history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceStatus'

    post:
      tags: [Service Timeline]
      summary: Add status update to service order
      description: Create a status update in the service timeline
      parameters:
        - name: service_order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceStatusRequest'
      responses:
        '201':
          description: Status update added to timeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatus'

  /service-status/{service_status_id}:
    get:
      tags: [Service Timeline]
      summary: Get specific status update
      parameters:
        - name: service_status_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Status update details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatus'

    patch:
      tags: [Service Timeline]
      summary: Update status comment
      parameters:
        - name: service_status_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceStatusRequest'
      responses:
        '200':
          description: Status update modified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatus'

    delete:
      tags: [Service Timeline]
      summary: Delete status update
      parameters:
        - name: service_status_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Status update deleted successfully

  # ==================== REFERENCE DATA ====================
  /references/roles:
    get:
      tags: [Reference Data]
      summary: Get all roles
      responses:
        '200':
          description: List of all roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
    post:
      tags: [Reference Data]
      summary: Create role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
    delete:
      tags: [Reference Data]
      summary: Delete role
      parameters:
        - name: role_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Role deleted successfully
    patch:
      tags: [Reference Data]
      summary: Update role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Role'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'

  /references/brands:
    get:
      tags: [Reference Data]
      summary: Get all brands
      responses:
        '200':
          description: List of all brands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Brand'

    post:
      tags: [Reference Data]
      summary: Create brand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBrandRequest'
      responses:
        '201':
          description: Brand created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Brand'
    
    patch:
      tags: [Reference Data]
      summary: Update brand
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBrandRequest'
      responses:
        '201':
          description: Brand created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Brand'
    delete:
      tags: [Reference Data]
      summary: Dalete brand
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBrandRequest'
      responses:
        '201':
          description: Brand created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Brand'



  /references/product-types:
    get:
      tags: [Reference Data]
      summary: Get all product types
      responses:
        '200':
          description: List of all product types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductsType'

    post:
      tags: [Reference Data]
      summary: Create product type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductsTypeRequest'
      responses:
        '201':
          description: Products type created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductsType'
    patch:
      tags: [Reference Data]
      summary: Create product type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductsTypeRequest'
      responses:
        '201':
          description: Products type created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductsType'
    delete:
      tags: [Reference Data]
      summary: Create product type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductsTypeRequest'
      responses:
        '201':
          description: Products type created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductsType'
    

  /references/status:
    get:
      tags: [Reference Data]
      summary: Get all statuses
      responses:
        '200':
          description: List of all service statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Status'


components:

  schemas:

    # ==================== ROLE ====================
    Role:
      type: object
      properties:
        role_id:
          type: integer
          format: number
          description: Unique role identifier
        role_name:
          type: string
          description: Name of the role (e.g., customer, servicer, customer_servicer, b2b_customer)
        is_servicer:
          type: boolean
          default: false
          description: Whether this role can perform service work
        is_customer:
          type: boolean
          default: false
          description: Whether this role can be a customer
        is_business:
          type: boolean
          default: false
          description: Whether this role is a B2B business entity
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateRoleRequest:
      type: object
      required:
        - role_name
      properties:
        role_id:
          type: integer
          format: number
        role_name:
          type: string
          example: "servicer"
        is_servicer:
          type: boolean
          example: true
        is_customer:
          type: boolean
          example: false
        is_business:
          type: boolean
          example: false

    # ==================== USER ====================
    Users:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
          description: Unique user identifier
        user_name:
          type: string
          description: Usersname (must be unique)
        email:
          type: string
          format: email
          description: Users email address (must be unique)
        address:
          type: string
          description: Users's physical address
        role:
          $ref: '#/components/schemas/Role'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateUsersRequest:
      type: object
      required:
        - user_name
        - email
        - role_id
      properties:
        user_name:
          type: string
          example: john_doe
        email:
          type: string
          format: email
          example: john@example.com
        address:
          type: string
          example: "123 Main St, City"
        role_id:
          type: integer
          format: number

    # ==================== CONTACT ====================
    Contacts:
      type: object
      properties:
        contact_id:
          type: string
          format: uuid
          description: Unique contact identifier
        contact_number:
          type: string
          description: Phone number
        user:
          $ref: '#/components/schemas/Users'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateContactsRequest:
      type: object
      required:
        - contact_number
        - user_id
      properties:
        contact_number:
          type: string
          example: "+91-9876543210"
        user_id:
          type: string
          format: uuid

    UpdateOrDeleteContactsRequest:
      type: object
      properties:
        contact_number:
          type: string
        user_id:
          type: string
          format: uuid

    # ==================== BRAND ====================
    Brand:
      type: object
      properties:
        brand_id:
          type: string
          format: uuid
        brand_name:
          type: string
          description: Name of the brand (e.g., Dell, HP, Lenovo)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateBrandRequest:
      type: object
      required:
        - brand_name
      properties:
        brand_name:
          type: string
          example: "Dell"

    # ==================== PRODUCT TYPE ====================
    ProductsType:
      type: object
      properties:
        product_type_id:
          type: string
          format: uuid
        type_name:
          type: string
          description: Type name (e.g., Laptop, Desktop, Tablet)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProductsTypeRequest:
      type: object
      required:
        - type_name
      properties:
        type_name:
          type: string
          example: "Laptop"

    # ==================== PRODUCT ====================
    Products:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        product_name:
          type: string
          example: "Dell Inspiron 15"
        description:
          type: string
          example: "15-inch laptop with Intel Core i7"
        brand_id:
          type: string
          format: uuid
        brand:
          $ref: '#/components/schemas/Brand'
        product_type_id:
          type: string
          format: uuid
        product_type:
          $ref: '#/components/schemas/ProductsType'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProductsRequest:
      type: object
      required:
        - product_name
        - brand_id
        - product_type_id
      properties:
        product_name:
          type: string
        description:
          type: string
        brand_id:
          type: string
          format: uuid
        product_type_id:
          type: string
          format: uuid

    # ==================== USER PRODUCT ====================
    UsersProducts:
      type: object
      properties:
        user_product_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        user:
          $ref: '#/components/schemas/Users'
        product_id:
          type: string
          format: uuid
        product:
          $ref: '#/components/schemas/Products'
        serial_number:
          type: string
          description: Unique serial number
        login_password:
          type: string
          description: Encrypted password for the device
        additional_info:
          type: string
          description: Extra information (e.g., RAM, Storage specs)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateUsersProductsRequest:
      type: object
      required:
        - product_id
        - serial_number
      properties:
        product_id:
          type: string
          format: uuid
        serial_number:
          type: string
        login_password:
          type: string
        additional_info:
          type: string

    # ==================== STATUS ====================
    Status:
      type: object
      properties:
        status_id:
          type: string
          format: uuid
        status_name:
          type: string
          description: Status name (e.g., PENDING, IN_PROGRESS, COMPLETED, ON_HOLD)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ==================== SERVICE ORDER ====================
    ServiceOrder:
      type: object
      properties:
        service_order_id:
          type: string
          format: uuid
        tag_no:
          type: string
          description: Auto-generated order number (YYDDDDD format, e.g., 2600001)
        user_product_id:
          type: string
          format: uuid
        user_product:
          $ref: '#/components/schemas/UsersProducts'
        estimated_price:
          type: number
          format: double
          description: Estimated repair cost
        final_price:
          type: number
          format: double
          description: Final repair cost
        payment_method:
          type: string
          enum: [CASH, CREDIT_CARD, DEBIT_CARD, ONLINE_PAYMENT, OTHER]
          description: Payment method used
        payment_status:
          type: string
          enum: [PENDING, COMPLETED, PARTIAL, REFUNDED]
          description: Payment status
        priority_level:
          type: integer
          minimum: 1
          maximum: 5
          default: 3
          description: Priority level (1=highest, 5=lowest)
        estimated_completion_date:
          type: string
          format: date-time
        actual_completion_date:
          type: string
          format: date-time
        issue_description:
          type: string
          enum: [HARDWARE, SOFTWARE, NETWORK, OTHER]
          description: Type of issue
        issue_notes:
          type: string
          description: Detailed notes about the issue
        entry_by:
          type: string
          format: uuid
          description: Users ID of servicer who created the order
        entry_user:
          $ref: '#/components/schemas/Users'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateServiceOrderRequest:
      type: object
      required:
        - user_product_id
        - issue_description
        - entry_by
      properties:
        user_product_id:
          type: string
          format: uuid
        estimated_price:
          type: number
          format: double
          minimum: 0
        payment_method:
          type: string
          enum: [CASH, CREDIT_CARD, DEBIT_CARD, ONLINE_PAYMENT, OTHER]
        priority_level:
          type: integer
          minimum: 1
          maximum: 5
          default: 3
        estimated_completion_date:
          type: string
          format: date-time
        issue_description:
          type: string
          enum: [HARDWARE, SOFTWARE, NETWORK, OTHER]
        issue_notes:
          type: string
        entry_by:
          type: string
          format: uuid
          description: Must be a servicer or admin user

    # ==================== SERVICE STATUS ====================
    ServiceStatus:
      type: object
      properties:
        service_status_id:
          type: string
          format: uuid
        service_order_id:
          type: string
          format: uuid
        service_order:
          $ref: '#/components/schemas/ServiceOrder'
        status_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/Status'
        assigned_to:
          type: string
          format: uuid
          description: Users ID of assigned servicer
        assigned_user:
          $ref: '#/components/schemas/Users'
        comment:
          type: string
          description: Status update comments
        notify_customer:
          type: boolean
          default: false
          description: Whether customer should be notified
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateServiceStatusRequest:
      type: object
      required:
        - service_order_id
        - status_id
        - assigned_to
      properties:
        service_order_id:
          type: string
          format: uuid
        status_id:
          type: string
          format: uuid
        assigned_to:
          type: string
          format: uuid
        comment:
          type: string
        notify_customer:
          type: boolean
          default: false

    # ==================== ERROR ====================
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
