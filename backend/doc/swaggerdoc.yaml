openapi: 3.0.3
info:
  title: KS Tech Service Management API
  version: 1.0.0
  description: 
    API for managing customers, products, and service orders
    in a laptop/service-center environment.

servers:
  - url: http://localhost:3000/api/v1

tags:
  - name: Users
  - name: Products
  - name: User Products
  - name: Service Orders
  - name: Service Timeline
  - name: Reference Data

paths: 
  /users:
    get:
      tags:
        - Users
      summary: Get all users
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
  /create-user:
    post:
      tags:
        - Users
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /delete-user/{contactNumber}:
    delete:
      tags:
        - Users
      summary: Delete a user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User deleted successfully
  
components:
  schemas: {}
