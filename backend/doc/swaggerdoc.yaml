openapi: 3.0.3

info:
  title: KS Tech Service Management API
  version: 1.0.0
  description: >
    API for managing users, products, and service orders
    in a service-center / repair business.
    Designed using API-first principles.

servers:
  - url: http://localhost:3000/api/v1

tags:
  - name: Users
  - name: Products
  - name: Service Orders
  - name: Service Timeline
  - name: Reference Data

paths:
  /users:
    get:
      tags: [Users]
      summary: Get all the users
      description: Used for autocomplete and user lookup
      parameters:
        - name: query
          in: query
          schema:
            type: string
      responses:  
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

    post:
      tags: [Users]
      summary: Create a new user
      description: Add a new user to the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:  
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/{userId}:
    delete:
      tags: [Users]
      summary: Delete user by ID
      description: Remove a user from the system using their unique ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:  
        '200':
          description: User deleted successfully

    put:
      tags: [Users]
      summary: Update user by ID
      description: Update user details using their unique ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:  
        '200':
          description: User updated successfully
  

  /users?contactnumber={contactnumber}:
    get:
      tags: [Users]
      summary: Get all user by contact number
      description: Retrieve all user details using contact number
      parameters:
        - name: contactnumber
          in: path
          required: true
          schema:
            type: string
      responses:  
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  
  /users?productserial={productserial}:
    get:
      tags: [Users]
      summary: Get user by product serial number
      description: Retrieve user details associated with a specific product serial number
      parameters:
        - name: productserial
          in: path
          required: true
          schema:
            type: string
      responses:  
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  
  /users/{userId}/contacts:
    get:
      tags: [Users]
      summary: Get all contact numbers for user
      description: Retrieve all contact numbers associated with a specific user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:  
        '200':
          description: List of contact numbers
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /users/{userId}/contact/{contactnumber}:
    post:
      tags: [Users]
      summary: Add contact number to user
      description: Add a new contact number for a specific user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contactnumber
          in: path
          required: true
          schema:
            type: string
      responses:  
        '201':
          description: Contact number added successfully

    delete:
      tags: [Users]
      summary: Delete contact number from user
      description: Remove a contact number from a specific user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contactnumber
          in: path
          required: true
          schema:
            type: string
      responses:  
        '200':
          description: Contact number deleted successfully
          
    put:
      tags: [Users]
      summary: Update contact number for user
      description: Update a contact number for a specific user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contactnumber
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newContactNumber:
                  type: string
      responses:  
        '200':
          description: Contact number updated successfully
  
  /users/{userId}/products:
    get:
      tags: [Users]
      summary: Get all products for user
      description: Retrieve all products associated with a specific user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:  
        '200':
          description: List of products for the user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
  
  /users/{userid}/products/{serialnumber}:
    post:
      tags: [Users]
      summary: Add product to user
      description: Associate a new product with a specific user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: serialnumber
          in: path
          required: true
          schema:
            type: string
      responses:  
        '201':
          description: Product added to user successfully

    delete:
      tags: [Users]
      summary: Delete product from user
      description: Remove a product association from a specific user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: serialnumber
          in: path
          required: true
          schema:
            type: string
      responses:  
        '200':
          description: Product deleted from user successfully
    
    put:
      tags: [Users]
      summary: Update product for user
      description: Update a product association for a specific user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: serialnumber
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newSerialNumber:
                  type: string
      responses:  
        '200':
          description: Product updated for user successfully

  /contacts:
    get:
      tags: [Users]
      summary: Get all the contacts
      description: Used for autocomplete and contact lookup
      parameters:
        - name: query
          in: query
          schema:
            type: string
      responses:  
        '200':
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /products:
    get:
      tags: [Products]
      summary: Get all the products list
      parameters:
        - name: serialNumber
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Matching products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

  /products?userId={userId}:
    get:
      tags: [Products]
      summary: Get products by user ID
      description: Retrieve all products associated with a specific user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of products for the user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
  
  /products?serialNumber={serialNumber}:
    get:
      tags: [Products]
      summary: Get product by serial number
      description: Retrieve product details using serial number
      parameters:
        - name: serialNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
  
  /service-orders:
    get:
      tags: [Service Orders]
      summary: Get all service orders
      responses:
        '200':
          description: List of service orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceOrder'
    post:
      tags: [Service Orders]
      summary: Create a service order
      description: >
        Creates a service order.
        Automatically creates user and product if they do not exist
        and initializes the service status timeline.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceOrderRequest'
      responses:
        '201':
          description: Service order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrder'

  /service-orders/activelist:
    get:
      tags: [Service Orders]
      summary: Get all active service orders
      responses:
        '200':
          description: List of active service orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceOrder'

  /service-orders/{tagnumber}:
    get:
      tags: [Service Orders]
      summary: Get service order by tag number
      parameters:
        - name: tagnumber
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Service order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrder'
    
    delete:
      tags: [Service Orders]
      summary: Delete service order by tag number
      parameters:
        - name: tagnumber
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Service order deleted successfully 

    put:
      tags: [Service Orders]
      summary: Update service order by tag number
      parameters:
        - name: tagnumber
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceOrder'
      responses:
        '200':
          description: Service order updated successfully 

  /service-orders/{tagnumber}/timeline:
    get:
      tags: [Service Timeline]
      summary: Get service timeline for a service order
      parameters:
        - name: tagnumber
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Service timeline details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceStatus'

    post:
      tags: [Service Timeline]
      summary: Add status update to service order timeline
      parameters:
        - name: tagnumber
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceStatus'
      responses:
        '201':
          description: Status update added to timeline
  
  /service-orders/{tagnumber}/timeline/{statusId}:
    delete:
      tags: [Service Timeline]
      summary: Delete status update from service order timeline
      parameters:
        - name: tagnumber
          in: path
          required: true
          schema:
            type: string
        - name: statusId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Status update deleted from timeline successfully

    put:
      tags: [Service Timeline]
      summary: Update status update in service order timeline
      parameters:
        - name: tagnumber
          in: path
          required: true
          schema:
            type: string
        - name: statusId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceStatus'
      responses:
        '200':
          description: Status update updated in timeline successfully
    

components:

  schemas:

    User:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        userName:
          type: string

    Product:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        productName:
          type: string
        brandId:
          type: string
          format: uuid
        productTypeId:
          type: string
          format: uuid

    Brand:
      type: object
      properties:
        brandId:
          type: string
          format: uuid
        brandName:
          type: string

    ProductType:
      type: object
      properties:
        productTypeId:
          type: string
          format: uuid
        typeName:
          type: string

    Status:
      type: object
      properties:
        statusId:
          type: string
          format: uuid
        statusName:
          type: string

    CreateServiceOrderRequest:
      type: object
      required:
        - customer
        - product
        - issue
      properties:
        customer:
          type: object
          required:
            - userName
            - contact
          properties:
            userName:
              type: string
            contact:
              type: object
              required:
                - email
                - contactNumber
              properties:
                email:
                  type: string
                  format: email
                contactNumber:
                  type: string

        product:
          type: object
          required:
            - brandId
            - productTypeId
            - serialNumber
          properties:
            brandId:
              type: string
              format: uuid
            productTypeId:
              type: string
              format: uuid
            serialNumber:
              type: string

        issue:
          type: object
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - HARDWARE
                - SOFTWARE
                - NETWORK
                - OTHER
            notes:
              type: string

    ServiceOrder:
      type: object
      properties:
        serviceOrderId:
          type: string
          format: uuid
        paymentStatus:
          type: string
        priorityLevel:
          type: integer
        createdAt:
          type: string
          format: date-time

    ServiceStatus:
      type: object
      properties:
        status:
          type: string
        assignedTo:
          type: string
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
