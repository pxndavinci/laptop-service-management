openapi: 3.0.3
info:
  description: "API for managing users, Products, and service orders in a service-center\
    \ / repair business. Designed using API-first principles."
  title: KS Tech Service Management API
  version: 1.0.0
servers:
- url: http://localhost:3000
tags:
- name: Users
- name: Contacts
- name: Products
- name: Service Orders
- name: Service Status
- name: Reference Data
paths:
  /users:
    get:
      description: Retrieve all users with optional filtering and pagination
      operationId: usersGET
      parameters:
      - description: Search by username
        explode: true
        in: query
        name: userName
        required: false
        schema:
          type: string
        style: form
      - description: Search by email
        explode: true
        in: query
        name: email
        required: false
        schema:
          type: string
        style: form
      - description: Filter by role ID
        explode: true
        in: query
        name: roleId
        required: false
        schema:
          format: number
          type: integer
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_users_get_200_response"
          description: List of users
      summary: Get all users
      tags:
      - Users
      x-eov-operation-handler: controllers/UsersController
    post:
      description: Add a new user to the system
      operationId: usersPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUser"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Users"
          description: Users created successfully
      summary: Create a new user
      tags:
      - Users
      x-eov-operation-handler: controllers/UsersController
  /users/{userId}:
    delete:
      description: Remove a user from the system
      operationId: usersUserIdDELETE
      parameters:
      - explode: false
        in: path
        name: userId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: Users deleted successfully
      summary: Delete user
      tags:
      - Users
      x-eov-operation-handler: controllers/UsersController
    get:
      description: Get user by ID
      operationId: usersUserIdGET
      parameters:
      - explode: false
        in: path
        name: userId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Users"
          description: Got user successfully
      summary: Get user by ID
      tags:
      - Users
      x-eov-operation-handler: controllers/UsersController
    patch:
      description: Update user details
      operationId: usersUserIdPATCH
      parameters:
      - explode: false
        in: path
        name: userId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchUser"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Users"
          description: Users updated successfully
      summary: Update user
      tags:
      - Users
      x-eov-operation-handler: controllers/UsersController
  /contacts:
    get:
      description: Retrieve all contacts with optional filtering
      operationId: contactsGET
      parameters:
      - description: Filter by contact number
        explode: true
        in: query
        name: contactNumber
        required: false
        schema:
          type: string
        style: form
      - description: Filter by user ID
        explode: true
        in: query
        name: userId
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_contacts_get_200_response"
          description: List of contacts
      summary: Get all contacts
      tags:
      - Contacts
      x-eov-operation-handler: controllers/ContactsController
    post:
      operationId: contactsPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContact"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contacts"
          description: Contacts created successfully
      summary: Create contact
      tags:
      - Contacts
      x-eov-operation-handler: controllers/ContactsController
  /contacts/{contactId}:
    delete:
      operationId: contactsContactIdDELETE
      parameters:
      - explode: false
        in: path
        name: contactId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: Contacts deleted successfully
      summary: Delete contact
      tags:
      - Contacts
      x-eov-operation-handler: controllers/ContactsController
    get:
      description: Get contact by ID
      operationId: contactsContactIdGET
      parameters:
      - explode: false
        in: path
        name: contactId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contacts"
          description: Got contact successfully
      summary: Get contact by ID
      tags:
      - Contacts
      x-eov-operation-handler: controllers/ContactsController
    patch:
      operationId: contactsContactIdPATCH
      parameters:
      - explode: false
        in: path
        name: contactId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchContact"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contacts"
          description: Contacts updated successfully
      summary: Update contact
      tags:
      - Contacts
      x-eov-operation-handler: controllers/ContactsController
  /products:
    get:
      description: Retrieve all Products with optional filtering
      operationId: productsGET
      parameters:
      - description: Filter by product name
        explode: true
        in: query
        name: productName
        required: false
        schema:
          type: string
        style: form
      - description: Filter by brand
        explode: true
        in: query
        name: brandId
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - description: Filter by product type
        explode: true
        in: query
        name: productTypeId
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_products_get_200_response"
          description: List of Products
      summary: Get all Products
      tags:
      - Products
      x-eov-operation-handler: controllers/ProductsController
    post:
      operationId: productsPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProduct"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Products"
          description: Products created successfully
      summary: Create product
      tags:
      - Products
      x-eov-operation-handler: controllers/ProductsController
  /products/{productId}:
    delete:
      operationId: productsProductIdDELETE
      parameters:
      - explode: false
        in: path
        name: productId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: Products deleted successfully
      summary: Delete product
      tags:
      - Products
      x-eov-operation-handler: controllers/ProductsController
    get:
      operationId: productsProductIdGET
      parameters:
      - explode: false
        in: path
        name: productId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Products"
          description: Got Product successfully
      summary: Get product by ID
      tags:
      - Products
      x-eov-operation-handler: controllers/ProductsController
    patch:
      operationId: productsProductIdPATCH
      parameters:
      - explode: false
        in: path
        name: productId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchProduct"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Products"
          description: Products updated successfully
      summary: Update product
      tags:
      - Products
      x-eov-operation-handler: controllers/ProductsController
  /user-products:
    get:
      description: Retrieve user Products with optional filtering
      operationId: user_productsGET
      parameters:
      - description: Filter by user ID
        explode: true
        in: query
        name: userId
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - description: Filter by product ID
        explode: true
        in: query
        name: productId
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - description: Filter by serial number
        explode: true
        in: query
        name: serialNumber
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_user_products_get_200_response"
          description: List of user Products
      summary: Get all user Products
      tags:
      - Products
      x-eov-operation-handler: controllers/ProductsController
    post:
      operationId: user_productsPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserProduct"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProducts"
          description: Users product created successfully
      summary: Create user product
      tags:
      - Products
      x-eov-operation-handler: controllers/ProductsController
  /user-products/{userProductId}:
    delete:
      operationId: user_productsUserProductIdDELETE
      parameters:
      - explode: false
        in: path
        name: userProductId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: Users product deleted successfully
      summary: Delete user product
      tags:
      - Products
      x-eov-operation-handler: controllers/ProductsController
    get:
      operationId: user_productsUserProductIdGET
      parameters:
      - explode: false
        in: path
        name: userProductId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProducts"
          description: Users product details
      summary: Get user product by ID
      tags:
      - Products
      x-eov-operation-handler: controllers/ProductsController
    patch:
      operationId: user_productsUserProductIdPATCH
      parameters:
      - explode: false
        in: path
        name: userProductId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchUserProduct"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProducts"
          description: Users product updated successfully
      summary: Update user product
      tags:
      - Products
      x-eov-operation-handler: controllers/ProductsController
  /service-orders:
    get:
      description: Retrieve all service orders with optional filtering
      operationId: service_ordersGET
      parameters:
      - description: Filter by tagNo
        explode: true
        in: query
        name: tagNo
        required: false
        schema:
          maximum: 999999
          minimum: 0
          type: integer
        style: form
      - description: Filter by userProductId
        explode: true
        in: query
        name: userProductId
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - description: Payment method used
        explode: true
        in: query
        name: paymentMethod
        required: false
        schema:
          enum:
          - CASH
          - CREDIT_CARD
          - DEBIT_CARD
          - ONLINE_PAYMENT
          - OTHER
          type: string
        style: form
      - description: Payment status
        explode: true
        in: query
        name: paymentStatus
        required: false
        schema:
          enum:
          - PENDING
          - COMPLETED
          - PARTIAL
          - REFUNDED
          type: string
        style: form
      - description: "Priority level (1=highest, 5=lowest)"
        explode: true
        in: query
        name: priorityLevel
        required: false
        schema:
          default: 3
          maximum: 5
          minimum: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: estimatedCompletionDate
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - explode: true
        in: query
        name: actualCompletionDate
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - explode: true
        in: query
        name: issueDescription
        required: false
        schema:
          enum:
          - HARDWARE
          - SOFTWARE
          - NETWORK
          - OTHER
          type: string
        style: form
      - description: Filter by status
        explode: true
        in: query
        name: status
        required: false
        schema:
          enum:
          - PENDING
          - IN_PROGRESS
          - COMPLETED
          - ON_HOLD
          type: string
        style: form
      - description: Filter by entered by service order person
        explode: true
        in: query
        name: entryBy
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_service_orders_get_200_response"
          description: List of service orders
      summary: Get all service orders
      tags:
      - Service Orders
      x-eov-operation-handler: controllers/ServiceOrdersController
    post:
      description: Create a new service order
      operationId: service_ordersPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceOrder"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceOrders"
          description: Service order created successfully
      summary: Create service order
      tags:
      - Service Orders
      x-eov-operation-handler: controllers/ServiceOrdersController
  /service-orders/{serviceOrderId}:
    delete:
      operationId: service_ordersServiceOrderIdDELETE
      parameters:
      - explode: false
        in: path
        name: serviceOrderId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: Service order deleted successfully
      summary: Delete service order
      tags:
      - Service Orders
      x-eov-operation-handler: controllers/ServiceOrdersController
    get:
      operationId: service_ordersServiceOrderIdGET
      parameters:
      - explode: false
        in: path
        name: serviceOrderId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceOrders"
          description: Service order details
        "404":
          description: Service order not found
      summary: Get service order by ID
      tags:
      - Service Orders
      x-eov-operation-handler: controllers/ServiceOrdersController
    patch:
      operationId: service_ordersServiceOrderIdPATCH
      parameters:
      - explode: false
        in: path
        name: serviceOrderId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceOrders"
          description: Service order updated successfully
        "404":
          description: Service order not found
      summary: Update service order
      tags:
      - Service Orders
      x-eov-operation-handler: controllers/ServiceOrdersController
  /service-status:
    get:
      description: Retrieve all status updates for a service order (timeline)
      operationId: service_statusGET
      parameters:
      - explode: true
        in: query
        name: serviceOrderId
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
        name: statusId
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
        name: assignedTo
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
        name: notifyCustomer
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ServiceStatuses"
                type: array
          description: Service status history
      summary: Get service status history
      tags:
      - Service Status
      x-eov-operation-handler: controllers/ServiceStatusController
    post:
      description: Create a status update in the service timeline
      operationId: service_statusPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceStatuses"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceStatuses"
          description: Status update added to timeline
      summary: Add status update to service order
      tags:
      - Service Status
      x-eov-operation-handler: controllers/ServiceStatusController
  /service-status/{serviceStatusId}:
    delete:
      operationId: service_statusServiceStatusIdDELETE
      parameters:
      - explode: false
        in: path
        name: serviceStatusId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: Status update deleted successfully
      summary: Delete status update
      tags:
      - Service Status
      x-eov-operation-handler: controllers/ServiceStatusController
    get:
      operationId: service_statusServiceStatusIdGET
      parameters:
      - explode: false
        in: path
        name: serviceStatusId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceStatuses"
          description: Status update details
      summary: Get specific status update
      tags:
      - Service Status
      x-eov-operation-handler: controllers/ServiceStatusController
    patch:
      operationId: service_statusServiceStatusIdPATCH
      parameters:
      - explode: false
        in: path
        name: serviceStatusId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchServiceStatuses"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceStatuses"
          description: Status update modified successfully
      summary: Update status comment
      tags:
      - Service Status
      x-eov-operation-handler: controllers/ServiceStatusController
  /references/roles:
    get:
      operationId: referencesRolesGET
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Roles"
                type: array
          description: List of all roles
      summary: Get all roles
      tags:
      - Reference Data
      x-eov-operation-handler: controllers/ReferenceDataController
    post:
      operationId: referencesRolesPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRole"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Roles"
          description: Role created
      summary: Create role
      tags:
      - Reference Data
      x-eov-operation-handler: controllers/ReferenceDataController
  /references/roles/role-id:
    delete:
      operationId: referencesRolesRoleIdDELETE
      parameters:
      - explode: false
        in: path
        name: roleId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: Role deleted successfully
      summary: Delete role
      tags:
      - Reference Data
      x-eov-operation-handler: controllers/ReferenceDataController
    patch:
      operationId: referencesRolesRoleIdPATCH
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchRole"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Roles"
          description: Role updated
      summary: Update role
      tags:
      - Reference Data
      x-eov-operation-handler: controllers/ReferenceDataController
  /references/brands:
    get:
      operationId: referencesBrandsGET
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Brands"
                type: array
          description: List of all brands
      summary: Get all brands
      tags:
      - Reference Data
      x-eov-operation-handler: controllers/ReferenceDataController
    post:
      operationId: referencesBrandsPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrand"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brands"
          description: Brand created
      summary: Create brand
      tags:
      - Reference Data
      x-eov-operation-handler: controllers/ReferenceDataController
  /references/brands/{brandId}:
    delete:
      operationId: referencesBrandsBrandIdDELETE
      parameters:
      - explode: false
        in: path
        name: brandId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: Brand deleted successfully
      summary: Delete brand
      tags:
      - Reference Data
      x-eov-operation-handler: controllers/ReferenceDataController
    patch:
      operationId: referencesBrandsBrandIdPATCH
      parameters:
      - explode: false
        in: path
        name: brandId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrand"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brands"
          description: Brand updated
      summary: Update brand
      tags:
