version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: lsm_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: lsm
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5433:5432"

  backend:
    build: ./backend
    container_name: lsm_backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: lsm_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3001:3000"

volumes:
  postgres_data:
